<mat-card class="about-card">
  <mat-card-content>
    <div class="about-layout">
      <img src="assets/kalman.jpg" alt="Kalman Gochman" class="author-photo" />
      <div class="about-text" [dir]="isHe ? 'rtl' : 'ltr'">
        @for (p of paragraphs; track $index) {
          <p>{{ p }}</p>
        }
      </div>
    </div>
  </mat-card-content>
</mat-card>
